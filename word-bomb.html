<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>三年级英语 · 单词三消乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#1a1a2e;--radius:10px;
  --font:'Comic Sans MS','Chalkboard SE','Noto Sans SC',sans-serif;
  --gold:#FFE66D;
}
body{font-family:var(--font);background:var(--bg);min-height:100vh;color:#fff;overflow-x:hidden;}
.header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);padding:10px;text-align:center;}
.header h1{font-size:17px;font-weight:700;}
.header .sub{font-size:10px;color:rgba(255,255,255,0.5);}

.page{display:none;padding:6px;max-width:460px;margin:0 auto;}
.page.active{display:block;}
.units{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.unit-card{
  background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);
  padding:10px 6px;cursor:pointer;text-align:center;transition:all 0.2s;
}
.unit-card:active{transform:scale(0.95);}
.unit-card .icon{font-size:20px;}
.unit-card .name{font-size:12px;font-weight:700;}
.unit-card:hover{border-color:var(--gold);}

.game-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.game-top .back-btn{
  background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.7);
  font-size:12px;cursor:pointer;padding:4px 8px;border-radius:8px;
}
.game-top .title{font-size:13px;font-weight:700;}

.stats-bar{display:flex;gap:4px;margin-bottom:4px;}
.stat-card{flex:1;background:rgba(255,255,255,0.06);border-radius:6px;padding:3px;text-align:center;}
.stat-card .num{font-size:13px;font-weight:800;}
.stat-card .label{font-size:7px;color:rgba(255,255,255,0.4);}
.stat-card.score .num{color:var(--gold);}
.stat-card.chain .num{color:#4ECDC4;}

.progress-wrap{background:rgba(255,255,255,0.08);border-radius:4px;height:3px;overflow:hidden;margin-bottom:4px;}
.progress-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#667eea,#f5576c,var(--gold));transition:width 0.3s ease;width:0%;}

.board-wrap{background:rgba(255,255,255,0.03);border-radius:10px;padding:4px;border:1px solid rgba(255,255,255,0.06);}
.board{display:grid;gap:2px;touch-action:manipulation;}

.tile{
  aspect-ratio:1;border-radius:6px;cursor:pointer;position:relative;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:10px;text-align:center;padding:1px;
  transition:all 0.15s ease;user-select:none;
  border:2px solid transparent;overflow:hidden;
  text-shadow:0 1px 2px rgba(0,0,0,0.4);
}
.tile.c0{background:linear-gradient(135deg,#4a5fc7,#667eea);}
.tile.c1{background:linear-gradient(135deg,#d04a5c,#f5576c);}
.tile.c2{background:linear-gradient(135deg,#2e9d8f,#4ECDC4);}
.tile.c3{background:linear-gradient(135deg,#e04a4a,#FF6B6B);}
.tile.c4{background:linear-gradient(135deg,#6bc4a3,#A8E6CF);}
.tile.c5{background:linear-gradient(135deg,#d4b820,#FFE66D);}
.tile.sel{
  border-color:var(--gold)!important;
  box-shadow:0 0 14px rgba(255,230,109,0.7);
  animation:pulse 0.8s ease-in-out infinite;
  z-index:10;
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.tile.matched{
  border-color:#fff!important;
  box-shadow:0 0 10px rgba(255,255,255,0.5);
  transform:scale(1.05);z-index:10;
}
.tile.empty{background:rgba(255,255,255,0.04)!important;border:1px dashed rgba(255,255,255,0.12)!important;cursor:default;pointer-events:none;}
.tile.falling{animation:fall 0.3s ease forwards;}
@keyframes fall{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.tile.pop{animation:popStar 0.35s ease forwards;pointer-events:none;}
@keyframes popStar{0%{transform:scale(1);opacity:1}40%{transform:scale(1.2);opacity:0.6}100%{transform:scale(0);opacity:0}}

.sp{
  position:absolute;font-weight:800;pointer-events:none;z-index:20;
  animation:sf 0.7s ease forwards;
}
@keyframes sf{0%{opacity:0;transform:translate(-50%,0)scale(0.5)}20%{opacity:1;transform:translate(-50%,-8px)scale(1.2)}100%{opacity:0;transform:translate(-50%,-40px)scale(0.8)}}

.hint{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);
  padding:5px 12px;border-radius:8px;border:1px solid var(--gold);
  font-size:12px;z-index:50;white-space:nowrap;pointer-events:none;
}

.result-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
.result-overlay.active{display:flex;}
.result-box{
  background:linear-gradient(145deg,#1a1a3e,#2d2d5e);
  border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:20px;max-width:300px;width:90%;text-align:center;
  animation:ri 0.4s ease;
}
@keyframes ri{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.result-box .emoji{font-size:40px;}
.result-box h2{font-size:17px;margin:2px 0;}
.result-box .stars{font-size:20px;margin:4px 0;}
.result-box .detail{font-size:11px;color:rgba(255,255,255,0.6);line-height:1.5;}
.result-box .reviews{font-size:10px;color:rgba(255,255,255,0.5);margin-top:6px;line-height:1.6;}
.result-box .btns{margin-top:8px;display:flex;gap:8px;justify-content:center;}
.btn{padding:7px 18px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
.btn-secondary{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}

@media(min-width:500px){.tile{font-size:12px;border-radius:8px;}.board{gap:3px;}}
@media(max-width:380px){.tile{font-size:9px;border-radius:5px;}.header h1{font-size:15px;}}
</style>
</head>
<body>
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="emoji" id="resultEmoji">🎉</div>
    <h2 id="resultTitle">太棒了！</h2>
    <div class="stars" id="resultStars">⭐⭐⭐</div>
    <div class="detail" id="resultDetail"></div>
    <div class="reviews" id="wordReview"></div>
    <div class="btns">
      <button class="btn btn-primary" onclick="replayUnit()">再玩一次</button>
      <button class="btn btn-secondary" onclick="backToMenu()">返回首页</button>
    </div>
  </div>
</div>

<div class="header"><h1>🔤 单词三消乐</h1><div class="sub">交换 · 三连消除 · 学单词</div></div>

<div class="page active" id="pageMenu"><div class="units" id="unitGrid"></div></div>

<div class="page" id="pageGame">
  <div class="game-top">
    <button class="back-btn" onclick="backToMenu()">← 返回</button>
    <span class="title" id="gameTitle">选择单元</span>
    <button class="back-btn" onclick="resetGame()">🔄</button>
  </div>
  <div class="stats-bar">
    <div class="stat-card score"><div class="num" id="sScore">0</div><div class="label">得分</div></div>
    <div class="stat-card chain"><div class="num" id="sChain">0</div><div class="label">连锁</div></div>
    <div class="stat-card pairs"><div class="num" id="sPairs">0/6</div><div class="label">已学</div></div>
    <div class="stat-card"><div class="num" id="sMoves">0</div><div class="label">步数</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
</div>

<script>
const UNITS=[
  {id:1,icon:'👋',name:'打招呼',words:[{en:'hello',zh:'你好'},{en:'hi',zh:'嗨'},{en:'good',zh:'好的'},{en:'morning',zh:'早上'},{en:'afternoon',zh:'下午'},{en:'evening',zh:'傍晚'}]},
  {id:2,icon:'😊',name:'问候',words:[{en:'fine',zh:'好的'},{en:'thank',zh:'谢谢'},{en:'how',zh:'怎么'},{en:'are',zh:'是'},{en:'you',zh:'你'},{en:'OK',zh:'好的'}]},
  {id:3,icon:'👨‍👩‍👧',name:'家人',words:[{en:'father',zh:'父亲'},{en:'mother',zh:'母亲'},{en:'brother',zh:'兄弟'},{en:'sister',zh:'姐妹'},{en:'grandpa',zh:'爷爷'},{en:'grandma',zh:'奶奶'}]},
  {id:4,icon:'👫',name:'朋友',words:[{en:'friend',zh:'朋友'},{en:'tall',zh:'高的'},{en:'short',zh:'矮的'},{en:'thin',zh:'瘦的'},{en:'fat',zh:'胖的'},{en:'big',zh:'大的'}]},
  {id:5,icon:'🦷',name:'身体',words:[{en:'nose',zh:'鼻子'},{en:'mouth',zh:'嘴巴'},{en:'eye',zh:'眼睛'},{en:'ear',zh:'耳朵'},{en:'face',zh:'脸'},{en:'head',zh:'头'}]},
  {id:6,icon:'🐾',name:'动物',words:[{en:'cat',zh:'猫'},{en:'dog',zh:'狗'},{en:'bird',zh:'鸟'},{en:'fish',zh:'鱼'},{en:'rabbit',zh:'兔子'},{en:'panda',zh:'熊猫'}]},
  {id:7,icon:'🍎',name:'水果',words:[{en:'apple',zh:'苹果'},{en:'orange',zh:'橙子'},{en:'banana',zh:'香蕉'},{en:'pear',zh:'梨'},{en:'grape',zh:'葡萄'},{en:'mango',zh:'芒果'}]},
  {id:8,icon:'🧸',name:'玩具',words:[{en:'ball',zh:'球'},{en:'doll',zh:'娃娃'},{en:'kite',zh:'风筝'},{en:'robot',zh:'机器人'},{en:'toy',zh:'玩具'},{en:'top',zh:'陀螺'}]}
];
const R=7,C=6;
let G=null;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*a.length|0;if(j!==i)[a[i],a[j]]=[a[j],a[i]];}}

function init(){
  const g=document.getElementById('unitGrid');g.innerHTML='';
  UNITS.forEach(u=>{
    const c=document.createElement('div');c.className='unit-card';
    c.innerHTML=`<div class="icon">${u.icon}</div><div class="name">${u.name}</div>`;
    c.onclick=()=>startGame(u.id);g.appendChild(c);
  });
}

function startGame(uid){
  const unit=UNITS.find(u=>u.id===uid);if(!unit)return;
  const pairs=unit.words.slice(0,6);
  let tiles=[];
  pairs.forEach((p,pid)=>{
    for(let i=0;i<7;i++)tiles.push({pid,type:i<4?'en':'zh',text:i<4?p.en:p.zh,learned:false});
  });
  shuffle(tiles);
  const grid=Array.from({length:R},()=>Array(C).fill(null));
  let ti=0;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(ti<tiles.length)grid[r][c]=tiles[ti++];

  G={uid,pairs,grid,sel:null,score:0,chain:0,moves:0,learned:{},work:false,over:false};
  // Remove initial match-3
  for(let a=0;a<500;a++){
    const m3=findMatch3();if(m3.length===0)break;
    m3.forEach(m=>{
      const np=(m.pid+1)%pairs.length;
      G.grid[m.r][m.c]={pid:np,type:Math.random()>0.5?'en':'zh',text:Math.random()>0.5?pairs[np].en:pairs[np].zh};
    });
  }
  document.getElementById('gameTitle').textContent=`${unit.icon} ${unit.name}`;
  showPage('pageGame');render();upd();hint('交换相邻方块，三个相同连成一线消除！');
}

// ─── Scan for Match-3 ───
function findMatch3(){
  const set=new Set();
  // Horizontal 3+
  for(let r=0;r<R;r++){
    let c=0;
    while(c<C-2){
      const a=G.grid[r][c],b=G.grid[r][c+1],cc=G.grid[r][c+2];
      if(a&&b&&cc&&a.pid===b.pid&&b.pid===cc.pid){
        set.add(`${r},${c}`);set.add(`${r},${c+1}`);set.add(`${r},${c+2}`);
        let nc=c+3;while(nc<C&&G.grid[r][nc]&&G.grid[r][nc].pid===a.pid){set.add(`${r},${nc}`);nc++;}
        c=nc;continue;
      }c++;
    }
  }
  // Vertical 3+
  for(let c=0;c<C;c++){
    let r=0;
    while(r<R-2){
      const a=G.grid[r][c],b=G.grid[r+1][c],cc=G.grid[r+2][c];
      if(a&&b&&cc&&a.pid===b.pid&&b.pid===cc.pid){
        set.add(`${r},${c}`);set.add(`${r+1},${c}`);set.add(`${r+2},${c}`);
        let nr=r+3;while(nr<R&&G.grid[nr][c]&&G.grid[nr][c].pid===a.pid){set.add(`${nr},${c}`);nr++;}
        r=nr;continue;
      }r++;
    }
  }
  return [...set].map(k=>{const[r,c]=k.split(',').map(Number);return{r,c,pid:G.grid[r][c].pid};});
}

// ─── Click Handler ───
document.getElementById('board').addEventListener('click',function(e){
  const el=e.target.closest('.tile');if(!el)return;
  if(G.work||G.over)return;
  const r=+el.dataset.r,c=+el.dataset.c;
  if(isNaN(r)||isNaN(c))return;
  const cell=G.grid[r][c];
  if(!cell)return;

  if(!G.sel){G.sel={r,c};render();hint('再点相邻方块交换');return;}
  if(G.sel.r===r&&G.sel.c===c){G.sel=null;render();return;}
  // Adjacent? Try swap
  if(Math.abs(G.sel.r-r)+Math.abs(G.sel.c-c)===1){
    if(!trySwap(G.sel.r,G.sel.c,r,c)){
      // Swap back - no match
      const t=G.grid[G.sel.r][G.sel.c];G.grid[G.sel.r][G.sel.c]=G.grid[r][c];G.grid[r][c]=t;
      render();hint('消除不了，再试试');
    }
    G.sel=null;
  }else{G.sel={r,c};render();}
});

// ─── Swap & Chain Detect ───
function trySwap(r1,c1,r2,c2){
  // Do swap
  const t=G.grid[r1][c1];G.grid[r1][c1]=G.grid[r2][c2];G.grid[r2][c2]=t;
  G.moves++;G.chain=0;render();upd();
  
  const m3=findMatch3();
  if(m3.length===0)return false;
  
  G.chain++;
  G.work=true;
  processChain(m3);
  return true;
}

function processChain(matches){
  // Learn words
  matches.forEach(m=>{G.learned[m.pid]=1;});
  const cnt=matches.length;
  const bonus=(G.chain-1)*20;
  G.score+=cnt*10+bonus;

  // Animate
  const els=document.getElementById('board').children;
  matches.forEach((m,i)=>{
    setTimeout(()=>{
      const el=els[m.r*C+m.c];if(!el)return;
      el.classList.add('pop');
      if(i===matches.length-1){
        const sp=document.createElement('div');sp.className='sp';
        sp.textContent='+'+(cnt*10+bonus);
        sp.style.cssText=`left:50%;top:50%;font-size:${Math.min(16+cnt*2,26)}px;color:#FFE66D;`;
        el.appendChild(sp);setTimeout(()=>sp.remove(),700);
      }
    },i*25);
  });

  // Show learning hint
  const pid=matches[0].pid;const p=G.pairs[pid];
  if(p)hint(`${p.en} = ${p.zh} ✨ (×${cnt})`);
  upd();

  setTimeout(()=>{
    // Remove matched
    matches.forEach(m=>{G.grid[m.r][m.c]=null;});
    // Gravity + compact
    compactAndDrop(()=>{
      // Check for new chains
      const next=findMatch3();
      if(next.length>0){
        G.chain++;
        processChain(next);
      }else{
        G.work=false;
        if(Object.keys(G.learned).length>=G.pairs.length){G.over=true;setTimeout(showResult,400);}
        else hint('继续交换！');
      }
    });
  },matches.length*25+400);
}

function compactAndDrop(cb){
  // Gravity
  for(let c=0;c<C;c++){
    let wr=R-1;
    for(let r=R-1;r>=0;r--){
      if(G.grid[r][c]!==null){
        if(r!==wr){G.grid[wr][c]=G.grid[r][c];G.grid[r][c]=null;}
        wr--;
      }
    }
  }
  // Shift left
  let wc=0;
  for(let c=0;c<C;c++){
    let has=false;
    for(let r=0;r<R;r++)if(G.grid[r][c]!==null){has=true;break;}
    if(has){
      if(c!==wc)for(let r=0;r<R;r++){G.grid[r][wc]=G.grid[r][c];G.grid[r][c]=null;}
      wc++;
    }
  }
  render();upd();
  // Animate falling
  setTimeout(()=>{document.querySelectorAll('.tile:not(.empty)').forEach(t=>t.classList.add('falling'));},30);
  setTimeout(cb,300);
}

function render(){
  const b=document.getElementById('board');
  b.style.gridTemplateColumns=`repeat(${C},1fr)`;b.innerHTML='';
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const cell=G.grid[r][c];
    const el=document.createElement('div');
    el.className=cell?`tile c${cell.pid}`:'tile empty';
    if(cell)el.textContent=cell.text;
    if(G.sel&&G.sel.r===r&&G.sel.c===c)el.className+=' sel';
    el.dataset.r=r;el.dataset.c=c;
    b.appendChild(el);
  }
}

function upd(){
  document.getElementById('sScore').textContent=G.score;
  document.getElementById('sChain').textContent=G.chain;
  const n=Object.keys(G.learned).length;
  document.getElementById('sPairs').textContent=n+'/'+G.pairs.length;
  document.getElementById('sMoves').textContent=G.moves;
  document.getElementById('progressBar').style.width=(n/G.pairs.length*100)+'%';
}

function hint(t){
  const el=document.createElement('div');el.className='hint';el.textContent=t;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
}

function showResult(){
  document.getElementById('resultOverlay').classList.add('active');
  const pct=Object.keys(G.learned).length/G.pairs.length;
  const st=pct>=1?3:(pct>=0.8?2:1);
  document.getElementById('resultEmoji').textContent=st>=3?'🏆':(st>=2?'🎉':'👏');
  document.getElementById('resultTitle').textContent=st>=3?'完美通关！':(st>=2?'真棒！':'继续加油！');
  document.getElementById('resultStars').textContent='⭐'.repeat(st)+'☆'.repeat(3-st);
  document.getElementById('resultDetail').innerHTML=`得分 <b>${G.score}</b> · ${G.moves}步 · 最高连锁 <b>×${G.chain}</b> · 学到 <b>${Object.keys(G.learned).length}/${G.pairs.length}</b>`;
  const words=Object.keys(G.learned).map(pid=>{const p=G.pairs[pid];return p?'<span style="color:#667eea">'+p.en+'</span>=<span style="color:#f5576c">'+p.zh+'</span>':'';}).filter(Boolean);
  document.getElementById('wordReview').innerHTML=words.length?'📖 '+words.join(' &nbsp;'):'';
}
function replayUnit(){document.getElementById('resultOverlay').classList.remove('active');startGame(G.uid);}
function backToMenu(){document.getElementById('resultOverlay').classList.remove('active');G.over=true;showPage('pageMenu');}
function resetGame(){if(G&&G.uid)startGame(G.uid);}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
init();
</script>
</body>
</html>
