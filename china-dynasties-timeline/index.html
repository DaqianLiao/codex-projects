<!DOCTYPE html>
<html lang="zh-CN" data-resolution="landscape">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      margin: 0; width: 1920px; height: 1080px;
      overflow: hidden; background: #0d0505;
    }
    body {
      font-family: 'Inter', sans-serif;
    }

    /* ─── Root ─── */
    #root {
      position: relative;
      width: 1920px; height: 1080px;
      background: radial-gradient(ellipse at 50% 30%, #1a0a0a 0%, #0d0505 70%);
      overflow: hidden;
    }

    /* ─── Decorative background particles ─── */
    .bg-particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,160,23,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ─── Title scene ─── */
    .title-scene {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .title-main {
      font-family: 'Noto Serif SC', serif;
      font-size: 80px; font-weight: 900;
      color: #E8C547;
      letter-spacing: 0.12em;
      text-shadow: 0 0 40px rgba(212,160,23,0.3), 0 4px 8px rgba(0,0,0,0.5);
    }
    .title-sub {
      font-family: 'Inter', sans-serif;
      font-size: 22px; font-weight: 300;
      color: #C4A86A;
      margin-top: 18px;
      letter-spacing: 0.25em;
    }
    .title-line {
      width: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, #D4A017, transparent);
      margin-top: 24px;
    }
    .title-byline {
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 300;
      color: #A69575;
      margin-top: 40px;
      letter-spacing: 0.15em;
    }

    /* ─── Timeline ─── */
    .timeline-track {
      position: absolute;
      left: 100px; right: 100px;
      height: 3px;
      background: linear-gradient(90deg, #D4A017 0%, #D4A017 100%);
      border-radius: 2px;
      box-shadow: 0 0 12px rgba(212,160,23,0.3);
      transform-origin: left center;
    }

    /* ─── Dynasty nodes ─── */
    .dynasty-node {
      position: absolute;
      display: flex; flex-direction: column;
      align-items: center;
    }
    .dynasty-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #D4A017;
      box-shadow: 0 0 10px rgba(212,160,23,0.5);
      border: 2px solid #1a0a0a;
    }
    .dynasty-connector {
      width: 2px;
      background: linear-gradient(to bottom, #D4A01744, #D4A01722);
    }

    /* ─── Dynasty cards ─── */
    .dynasty-card {
      background: linear-gradient(135deg, #1e0e0e, #150808);
      border: 1px solid rgba(212,160,23,0.2);
      border-radius: 8px;
      padding: 14px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,160,23,0.1);
    }
    .dynasty-chinese {
      font-family: 'Noto Serif SC', serif;
      font-size: 36px; font-weight: 700;
      color: #E8C547;
      line-height: 1.2;
    }
    .dynasty-pinyin {
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 300;
      color: #A0896A;
      margin-top: 4px;
      letter-spacing: 0.1em;
    }
    .dynasty-year {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 400;
      color: #E8604C;
      margin-top: 4px;
    }
    .dynasty-desc {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 300;
      color: #A69575;
      margin-top: 2px;
      max-width: 120px;
      line-height: 1.3;
    }

    /* ─── Era bands ─── */
    .era-band {
      position: absolute;
      height: 100%;
      opacity: 0.08;
      pointer-events: none;
    }

    /* ─── Highlight ring ─── */
    .highlight-ring {
      position: absolute;
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(212,160,23,0.4);
      pointer-events: none;
    }

    /* ─── Outro ─── */
    .outro {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .outro-text {
      font-family: 'Noto Serif SC', serif;
      font-size: 48px; font-weight: 700;
      color: #E8C547;
      letter-spacing: 0.08em;
    }
    .outro-sub {
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 300;
      color: #A69575;
      margin-top: 16px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div data-hf-id="hf-wx9m" id="root" data-composition-id="main" data-start="0" data-duration="22" data-width="1920" data-height="1080">
    <!-- ─── Background particles ─── -->
    <div data-hf-id="hf-c2dr" class="bg-particle" style="width:500px;height:500px;left:-100px;top:200px;"></div>
    <div data-hf-id="hf-b751" class="bg-particle" style="width:400px;height:400px;right:-80px;top:600px;"></div>
    <div data-hf-id="hf-jfz9" class="bg-particle" style="width:300px;height:300px;left:800px;top:-50px;"></div>

    <!-- ─── Scene 1: Title ─── -->
    <div data-hf-id="hf-vqb0" id="title-scene" class="title-scene">
      <div data-hf-id="hf-l7bw" id="title-main" class="title-main">中国历史朝代</div>
      <div data-hf-id="hf-qlbs" id="title-sub" class="title-sub">A Timeline of Chinese Dynasties</div>
      <div data-hf-id="hf-ux8e" id="title-line" class="title-line"></div>
      <div data-hf-id="hf-v384" id="title-byline" class="title-byline">从夏到清 · 四千年文明</div>
    </div>

    <!-- ─── Scene 2: Timeline ─── -->
    <div data-hf-id="hf-se08" id="timeline-scene" style="position:absolute;inset:0;opacity:0;">
      <!-- Era background bands -->
      <div data-hf-id="hf-7ev6" id="era-ancient" class="era-band" style="left:100px;width:340px;top:0;background:linear-gradient(180deg,rgba(192,57,43,0.3),transparent);"></div>
      <div data-hf-id="hf-al8y" id="era-imperial" class="era-band" style="left:440px;width:460px;top:0;background:linear-gradient(180deg,rgba(212,160,23,0.15),transparent);"></div>
      <div data-hf-id="hf-vmon" id="era-medieval" class="era-band" style="left:900px;width:380px;top:0;background:linear-gradient(180deg,rgba(100,150,200,0.1),transparent);"></div>
      <div data-hf-id="hf-roux" id="era-late" class="era-band" style="left:1280px;width:540px;top:0;background:linear-gradient(180deg,rgba(180,120,80,0.1),transparent);"></div>

      <!-- Timeline track -->
      <div data-hf-id="hf-pzuw" id="timeline-track" class="timeline-track" style="top:700px;scaleX:0;"></div>

      <!-- Dynasty nodes — generated via JS -->
      <div data-hf-id="hf-1aoy" id="dynasty-container" style="position:absolute;inset:0;"></div>
    </div>

    <!-- ─── Scene 3: Outro ─── -->
    <div data-hf-id="hf-g2bt" id="outro-scene" class="outro" style="opacity:0;">
      <div data-hf-id="hf-8gw7" class="outro-text">五千年文明</div>
      <div data-hf-id="hf-5d81" class="outro-sub">Five Millennia of Civilization</div>
    </div>
  </div>

  <script>
    window.__timelines = window.__timelines || {};
    const root = document.getElementById('root');
    const compositionId = root.dataset.compositionId;
    const tl = gsap.timeline({ paused: true });

    // ─── Dynasty data ───
    const dynasties = [
      { chinese: '夏', pinyin: 'Xià', year: 'ca. 2070 BCE', desc: 'The first dynasty', color: '#C0392B' },
      { chinese: '商', pinyin: 'Shāng', year: 'ca. 1600 BCE', desc: 'Oracle bone script', color: '#D4502A' },
      { chinese: '周', pinyin: 'Zhōu', year: '1046 BCE', desc: 'Feudal system', color: '#C47A2B' },
      { chinese: '秦', pinyin: 'Qín', year: '221 BCE', desc: 'First Emperor, Great Wall', color: '#8B4513' },
      { chinese: '汉', pinyin: 'Hàn', year: '206 BCE', desc: 'Silk Road, golden age', color: '#B8860B' },
      { chinese: '晋', pinyin: 'Jìn', year: '265 CE', desc: 'Division and reunification', color: '#6B5B3A' },
      { chinese: '隋', pinyin: 'Suí', year: '581 CE', desc: 'Grand Canal', color: '#5C4033' },
      { chinese: '唐', pinyin: 'Táng', year: '618 CE', desc: 'Golden age, cosmopolitan', color: '#D4A017' },
      { chinese: '宋', pinyin: 'Sòng', year: '960 CE', desc: 'Printing, gunpowder', color: '#4A7C59' },
      { chinese: '元', pinyin: 'Yuán', year: '1271 CE', desc: 'Mongol rule, Pax Mongolica', color: '#3B5998' },
      { chinese: '明', pinyin: 'Míng', year: '1368 CE', desc: 'Forbidden City, voyages', color: '#C0392B' },
      { chinese: '清', pinyin: 'Qīng', year: '1644 CE', desc: 'Last imperial dynasty', color: '#1A1A3A' },
    ];

    // ─── Build dynasty DOM ───
    const container = document.getElementById('dynasty-container');
    const N = dynasties.length;
    const xStart = 160;
    const xEnd = 1780;
    const spacing = (xEnd - xStart) / (N - 1);
    const timelineY = 700;

    dynasties.forEach((d, i) => {
      const x = Math.round(xStart + i * spacing);
      const isAbove = i % 2 === 0;

      const node = document.createElement('div');
      node.className = 'dynasty-node';
      node.id = 'dynasty-node-' + i;
      node.style.left = x + 'px';

      // Card position: above or below timeline
      if (isAbove) {
        node.style.top = (timelineY - 160) + 'px';
      } else {
        node.style.top = (timelineY + 30) + 'px';
      }

      node.innerHTML = `
        <div class="dynasty-card" id="dynasty-card-${i}">
          <div class="dynasty-chinese">${d.chinese}</div>
          <div class="dynasty-pinyin">${d.pinyin}</div>
          <div class="dynasty-year">${d.year}</div>
          <div class="dynasty-desc">${d.desc}</div>
        </div>
      `;

      container.appendChild(node);
    });

    // ─── Create connector + dot for each node ───
    dynasties.forEach((d, i) => {
      const x = Math.round(xStart + i * spacing);
      const isAbove = i % 2 === 0;

      // Dot on timeline
      const dot = document.createElement('div');
      dot.id = 'dot-' + i;
      dot.className = 'dynasty-dot';
      dot.style.position = 'absolute';
      dot.style.left = (x - 6) + 'px';
      dot.style.top = (timelineY - 6) + 'px';
      dot.style.scale = '0';
      container.appendChild(dot);

      // Connector line
      const conn = document.createElement('div');
      conn.id = 'conn-' + i;
      conn.className = 'dynasty-connector';
      conn.style.position = 'absolute';
      conn.style.left = (x - 1) + 'px';

      if (isAbove) {
        conn.style.top = (timelineY - 8) + 'px';
        conn.style.height = '148px';
      } else {
        conn.style.top = (timelineY + 14) + 'px';
        conn.style.height = '16px';
      }
      conn.style.scaleY = '0';
      conn.style.transformOrigin = 'top center';
      container.appendChild(conn);
    });

    // ─── GSAP Timeline ───

    // Title scene (0-3.5s)
    tl.from('#title-main', { y: 60, opacity: 0, duration: 0.8, ease: 'power3.out' }, 0.3);
    tl.from('#title-sub', { y: 30, opacity: 0, duration: 0.6, ease: 'power2.out' }, 1.0);
    tl.from('#title-line', { scaleX: 0, duration: 0.5, ease: 'power2.out', transformOrigin: 'center center' }, 1.1);
    tl.from('#title-byline', { y: 20, opacity: 0, duration: 0.5, ease: 'power2.out' }, 1.6);
    tl.to('#title-scene', { opacity: 0, duration: 0.5 }, 3.0);

    // Timeline scene (3.0-18.0s)
    tl.set('#timeline-scene', { opacity: 1 }, 3.0);

    // Era bands fade in
    tl.from('#era-ancient', { opacity: 0, duration: 0.4 }, 3.1);
    tl.from('#era-imperial', { opacity: 0, duration: 0.4 }, 3.15);
    tl.from('#era-medieval', { opacity: 0, duration: 0.4 }, 3.2);
    tl.from('#era-late', { opacity: 0, duration: 0.4 }, 3.25);

    // Timeline bar draws
    tl.to('#timeline-track', { scaleX: 1, duration: 0.8, ease: 'power3.inOut' }, 3.1);

    // Dynasty nodes appear sequentially
    dynasties.forEach((d, i) => {
      const startTime = 4.0 + i * 1.0;
      const cardEl = '#dynasty-card-' + i;
      const dotEl = '#dot-' + i;
      const connEl = '#conn-' + i;

      // Set initial state
      tl.set(cardEl, { opacity: 0, y: i % 2 === 0 ? -30 : 30, scale: 0.6 }, startTime);

      // Appear
      tl.to(cardEl, {
        opacity: 1, y: 0, scale: 1,
        duration: 0.5, ease: 'back.out(1.4)'
      }, startTime);

      // Connector grows
      tl.to(connEl, { scaleY: 1, duration: 0.3, ease: 'power2.out' }, startTime + 0.15);

      // Dot appears
      tl.to(dotEl, { scale: 1, duration: 0.2, ease: 'back.out(2)' }, startTime + 0.3);

      // Subtle highlight pulse
      tl.to(cardEl, {
        borderColor: 'rgba(212,160,23,0.5)',
        boxShadow: '0 0 20px rgba(212,160,23,0.15)',
        duration: 0.3
      }, startTime + 0.2);

      tl.to(cardEl, {
        borderColor: 'rgba(212,160,23,0.2)',
        boxShadow: '0 4px 20px rgba(0,0,0,0.4)',
        duration: 0.4
      }, startTime + 0.7);
    });

    // Outro (18.0-22.0s)
    const lastDynastyStart = 4.0 + (N - 1) * 1.0;
    tl.set('#outro-scene', { opacity: 1 }, 18.5);
    tl.from('#outro-scene .outro-text', {
      y: 40, opacity: 0, duration: 0.7, ease: 'power3.out'
    }, 18.5);
    tl.from('#outro-scene .outro-sub', {
      y: 20, opacity: 0, duration: 0.5, ease: 'power2.out'
    }, 19.2);

    window.__timelines[compositionId] = tl;
  </script>
</body>
</html>
